    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Get On A Pod",
      "description": "Podcast booking service for founders, advisors, operators, and experts who want approval-first outreach and live campaign visibility.",
      "url": "https://getonapod.com",
      "logo": "https://getonapod.com/icon-512.png",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Sales",
        "availableLanguage": "English"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Service",
      "serviceType": "Podcast Booking & Guest Placement",
      "provider": {
        "@type": "Organization",
        "name": "Get On A Pod"
      },
      "areaServed": "Worldwide",
      "description": "Done-for-you podcast booking service with shortlist approvals, managed outreach, booking support, and client portal tracking. The core plan starts at $749 per month.",
      "offers": {
        "@type": "Offer",
        "availability": "https://schema.org/InStock",
        "price": "749",
        "priceCurrency": "USD",
        "priceSpecification": {
          "@type": "UnitPriceSpecification",
          "price": "749",
          "priceCurrency": "USD",
          "billingDuration": "P1M"
        }
      }
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What kind of podcasts will I be on?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We target shows based on your expertise, audience fit, topic match, and whether the format actually supports a strong guest conversation."
          }
        },
        {
          "@type": "Question",
          "name": "How fast will I get booked?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most clients see their first booking within 2 to 4 weeks, depending on positioning, approvals, and host responsiveness."
          }
        },
        {
          "@type": "Question",
          "name": "Can I approve shows before outreach starts?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Your portal shows the podcasts we recommend, why they fit, and where they sit in the workflow. Outreach only starts after your approval."
          }
        },
        {
          "@type": "Question",
          "name": "How much does it cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The current core plan starts at $749 per month and includes a minimum of 2 podcast bookings, portal visibility, approvals, and guest prep support."
          }
        }
      ]
    }
    </script>

  </head>
