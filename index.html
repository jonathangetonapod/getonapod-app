<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Get On A Pod - Podcast Booking Agency | Get Booked on Top Shows</title>
    <meta name="title" content="Get On A Pod - Podcast Booking Agency | Get Booked on Top Shows" />
    <meta name="description" content="Done-for-you podcast booking for founders and financial professionals. We research, pitch, and book podcast appearances that build your credibility. Starting at $499/month." />
    <meta name="keywords" content="podcast booking agency, podcast guest booking, podcast marketing, thought leadership, podcast guesting service, business podcasts, podcast PR" />
    <meta name="author" content="Get On A Pod" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://getonapod.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://getonapod.com/" />
    <meta property="og:title" content="Get On A Pod - Podcast Booking Agency | Get Booked on Top Shows" />
    <meta property="og:description" content="Done-for-you podcast booking for founders and financial professionals. We research, pitch, and book podcast appearances that build your credibility. Starting at $499/month." />
    <meta property="og:image" content="https://getonapod.com/og-image.jpg" />
    <meta property="og:site_name" content="Get On A Pod" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://getonapod.com/" />
    <meta name="twitter:title" content="Get On A Pod - Podcast Booking Agency | Get Booked on Top Shows" />
    <meta name="twitter:description" content="Done-for-you podcast booking for founders and financial professionals. We research, pitch, and book podcast appearances that build your credibility. Starting at $499/month." />
    <meta name="twitter:image" content="https://getonapod.com/og-image.jpg" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Get On A Pod",
      "description": "Podcast booking agency that secures premium podcast placements for thought leaders and business owners",
      "url": "https://getonapod.com",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Sales",
        "availableLanguage": "English"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Service",
      "serviceType": "Podcast Booking & Guest Placement",
      "provider": {
        "@type": "Organization",
        "name": "Get On A Pod"
      },
      "areaServed": "Worldwide",
      "description": "Done-for-you podcast booking service for founders and financial professionals. We research, pitch, and book podcast appearances that build your credibility. Starting at $499/month with guaranteed bookings.",
      "offers": {
        "@type": "Offer",
        "availability": "https://schema.org/InStock",
        "price": "499",
        "priceCurrency": "USD",
        "priceSpecification": {
          "@type": "UnitPriceSpecification",
          "price": "499",
          "priceCurrency": "USD",
          "billingDuration": "P1M"
        }
      }
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What kind of podcasts will I be on?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Shows relevant to your expertise and target audience. We research and curate podcasts specifically for your niche."
          }
        },
        {
          "@type": "Question",
          "name": "How fast will I get booked?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most clients see their first bookings within 2-3 weeks of approval."
          }
        },
        {
          "@type": "Question",
          "name": "How much does it cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "$499/month for 2+ guaranteed podcast bookings, Podcast Command Center access, and reporting & analytics."
          }
        },
        {
          "@type": "Question",
          "name": "Is there a long-term commitment?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Month-to-month, cancel anytime."
          }
        }
      ]
    }
    </script>

    <!-- Stripe Buy Button -->
    <script async src="https://js.stripe.com/v3/buy-button.js"></script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
